<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch List – Config</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #0e0e10; color: #efeff1; font-size: 13px; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .card { background: #18181b; border: 1px solid #2a2a2e; border-radius: 8px; padding: 24px; width: 340px; }
    h1 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .sub { font-size: 12px; color: #adadb8; margin-bottom: 20px; line-height: 1.5; }
    .section-title { font-size: 11px; font-weight: 600; color: #9147ff; text-transform: uppercase; letter-spacing: 0.5px; margin: 16px 0 10px; }
    .field { margin-bottom: 10px; }
    label { font-size: 12px; color: #adadb8; display: block; margin-bottom: 5px; }
    input { width: 100%; padding: 8px 10px; background: #0e0e10; border: 1px solid #2a2a2e; border-radius: 6px; color: #efeff1; font-size: 13px; outline: none; }
    input:focus { border-color: #9147ff; }
    .hint { font-size: 10px; color: #555; margin-top: 3px; }
    .btn { width: 100%; margin-top: 16px; padding: 9px; background: #9147ff; color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn:hover { background: #772ce8; }
    .btn:disabled { background: #444; cursor: not-allowed; }
    .status { margin-top: 12px; font-size: 12px; text-align: center; min-height: 18px; }
    .status.ok { color: #00c853; }
    .status.err { color: #ff6b6b; }
    .divider { border: none; border-top: 1px solid #2a2a2e; margin: 4px 0; }
  </style>
</head>
<body>
<div class="card">
  <h1>🎬 Watch List Setup</h1>
  <p class="sub">Configure your TMDB lists to show your curated watch list to viewers.</p>

  <div class="section-title">TMDB Account</div>
  <div class="field">
    <label for="input-name">Your name (shown in the panel)</label>
    <input type="text" id="input-name" placeholder="e.g. NerdIdeias" autocomplete="off" />
  </div>
  <div class="field">
    <label for="input-apikey">TMDB API Key (v3)</label>
    <input type="password" id="input-apikey" placeholder="Paste your API key here" autocomplete="off" />
    <div class="hint">Get it at themoviedb.org → Settings → API</div>
  </div>

  <hr class="divider">
  <div class="section-title">List IDs</div>

  <div class="field">
    <label for="input-films">🏆 Recommended Films — List ID</label>
    <input type="text" id="input-films" placeholder="e.g. 8658145" autocomplete="off" />
    <div class="hint">themoviedb.org/list/<strong>ID</strong>-name</div>
  </div>
  <div class="field">
    <label for="input-series">🏆 Recommended Series — List ID</label>
    <input type="text" id="input-series" placeholder="e.g. 8658147" autocomplete="off" />
  </div>
  <div class="field">
    <label for="input-watchfilms">🍿 Films to Watch — List ID</label>
    <input type="text" id="input-watchfilms" placeholder="e.g. 8658164" autocomplete="off" />
  </div>
  <div class="field">
    <label for="input-watchseries">📺 Series to Watch — List ID</label>
    <input type="text" id="input-watchseries" placeholder="e.g. 8658165" autocomplete="off" />
  </div>

  <button class="btn" id="save-btn">Save & Verify</button>
  <div class="status" id="status"></div>
</div>
<script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
<script src="config.js"></script>
</body>
</html>
