<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch List</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #0e0e10; color: #efeff1; font-size: 13px; }
    .panel { padding: 12px; }
    .header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .header-title { font-size: 15px; font-weight: 600; }
    .header-sub { font-size: 11px; color: #adadb8; }
    .tabs { display: flex; gap: 2px; margin-bottom: 10px; border-bottom: 1px solid #2a2a2e; }
    .tab { flex: 1; font-size: 10px; padding: 6px 2px; cursor: pointer; border: none; background: none; color: #adadb8; border-bottom: 2px solid transparent; margin-bottom: -1px; line-height: 1.3; }
    .tab.active { color: #efeff1; border-bottom: 2px solid #9147ff; font-weight: 600; }
    .tab:hover:not(.active) { color: #efeff1; }
    .count { font-size: 10px; background: #2a2a2e; border-radius: 10px; padding: 1px 5px; margin-left: 3px; }
    .list { display: flex; flex-direction: column; gap: 6px; }
    .card { display: flex; gap: 8px; padding: 8px; border-radius: 6px; background: #18181b; border: 1px solid #2a2a2e; }
    .cover { width: 40px; height: 57px; border-radius: 3px; object-fit: cover; flex-shrink: 0; background: #2a2a2e; }
    .cover-placeholder { width: 40px; height: 57px; border-radius: 3px; flex-shrink: 0; background: #2a2a2e; display: flex; align-items: center; justify-content: center; color: #555; font-size: 18px; }
    .info { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
    .title { font-size: 12px; font-weight: 600; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .year { font-size: 11px; color: #adadb8; margin-top: 4px; }
    .empty { text-align: center; padding: 30px 16px; color: #adadb8; }
    .empty-icon { font-size: 28px; display: block; margin-bottom: 8px; opacity: 0.4; }
    .loading { text-align: center; padding: 30px 16px; color: #adadb8; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #2a2a2e; border-top-color: #9147ff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { text-align: center; padding: 16px; color: #ff6b6b; background: #1e1014; border-radius: 6px; font-size: 12px; }
    .footer { margin-top: 10px; text-align: center; font-size: 10px; color: #555; }
    .footer a { color: #9147ff; text-decoration: none; }
    .not-configured { text-align: center; padding: 30px 16px; color: #adadb8; font-size: 12px; line-height: 1.8; }
  </style>
</head>
<body>
<div class="panel">
  <div class="header">
    <span style="font-size:20px">🎬</span>
    <div>
      <div class="header-title">Watch List</div>
      <div class="header-sub" id="streamer-name">Loading...</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-films">🏆 Films <span class="count" id="count-films">0</span></button>
    <button class="tab" id="tab-series">🏆 Series <span class="count" id="count-series">0</span></button>
    <button class="tab" id="tab-watchfilms">🍿 To Watch <span class="count" id="count-watchfilms">0</span></button>
    <button class="tab" id="tab-watchseries">📺 To Watch <span class="count" id="count-watchseries">0</span></button>
  </div>

  <div id="list-container">
    <div class="loading"><span class="spinner"></span>Loading...</div>
  </div>

  <div class="footer">
    Powered by <a href="https://www.themoviedb.org" target="_blank">TMDB</a>
  </div>
</div>
<script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
<script src="viewer.js"></script>
</body>
</html>
