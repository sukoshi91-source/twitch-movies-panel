<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NerdIdeias — Watch List</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e10;
    --bg2: #18181b;
    --bg3: #1f1f23;
    --border: rgba(255,255,255,0.08);
    --text: #efeff1;
    --muted: #adadb8;
    --accent: #e91916;
    --accent2: #ff6b35;
    --tab-active: #ffffff;
    --radius: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  .panel {
    width: 100%;
    max-width: 340px;
    margin: 0 auto;
    background: var(--bg);
  }

  .header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header-logo {
    font-family: 'Bebas Neue', cursive;
    font-size: 20px;
    letter-spacing: 1px;
    color: var(--accent);
    line-height: 1;
  }
  .header-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .tabs {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 10px 4px 8px;
    text-align: center;
    font-size: 10px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    border: none;
    background: none;
    transition: color .15s, background .15s;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    line-height: 1.3;
    position: relative;
  }
  .tab:hover { color: var(--text); background: var(--bg3); }
  .tab.active {
    color: var(--tab-active);
    background: var(--bg3);
  }
  .tab.active::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
  }
  .tab-icon { font-size: 15px; display: block; margin-bottom: 3px; }

  .content { display: none; }
  .content.active { display: block; }

  .list { padding: 8px 0; }

  .item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 8px 14px;
    transition: background .12s;
    cursor: default;
  }
  .item:hover { background: var(--bg2); }

  .poster {
    width: 38px;
    height: 57px;
    border-radius: 4px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--bg3);
    border: 1px solid var(--border);
  }
  .poster-placeholder {
    width: 38px;
    height: 57px;
    border-radius: 4px;
    flex-shrink: 0;
    background: var(--bg3);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 16px;
  }

  .info { flex: 1; min-width: 0; padding-top: 2px; }
  .title {
    font-weight: 500;
    font-size: 13px;
    color: var(--text);
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .year {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 0 14px;
  }

  .state-msg {
    text-align: center;
    padding: 28px 16px;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.6;
  }
  .state-msg .icon { font-size: 24px; display: block; margin-bottom: 8px; opacity: 0.5; }

  .count-bar {
    padding: 8px 14px 4px;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
  }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .tmdb-badge {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 8px 14px;
    gap: 4px;
    border-top: 1px solid var(--border);
  }
  .tmdb-badge span {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .tmdb-badge img { height: 12px; opacity: 0.5; }

  .error-msg {
    padding: 12px 14px;
    font-size: 12px;
    color: #ff6b6b;
    background: rgba(255,107,107,0.08);
    margin: 8px 14px;
    border-radius: var(--radius);
    border: 1px solid rgba(255,107,107,0.2);
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="panel">
  <div class="header">
    <div>
      <div class="header-logo">NerdIdeias</div>
      <div class="header-sub">Watch List</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab(0)" aria-label="Recommended Films">
      <span class="tab-icon">🏆</span>Films
    </button>
    <button class="tab" onclick="switchTab(1)" aria-label="Recommended Series">
      <span class="tab-icon">🏆</span>Series
    </button>
    <button class="tab" onclick="switchTab(2)" aria-label="Films to Watch">
      <span class="tab-icon">🍿</span>To Watch
    </button>
    <button class="tab" onclick="switchTab(3)" aria-label="Series to Watch">
      <span class="tab-icon">📺</span>To Watch
    </button>
  </div>

  <div class="content active" id="tab0">
    <div class="state-msg"><span class="spinner"></span> Loading...</div>
  </div>
  <div class="content" id="tab1">
    <div class="state-msg"><span class="spinner"></span> Loading...</div>
  </div>
  <div class="content" id="tab2">
    <div class="state-msg"><span class="spinner"></span> Loading...</div>
  </div>
  <div class="content" id="tab3">
    <div class="state-msg"><span class="spinner"></span> Loading...</div>
  </div>

  <div class="tmdb-badge">
    <span>Powered by TMDB</span>
  </div>
</div>

<script>
// ============================================================
//  CONFIGURAÇÃO — substitui pela tua API key
// ============================================================
const API_KEY   = 'A_TUA_API_KEY_AQUI';
const LIST_IDS  = {
  films:        '8658145',
  series:       '8658147',
  watchFilms:   '8658164',
  watchSeries:  '8658165'
};
// ============================================================

const IMG = 'https://image.tmdb.org/t/p/w92';
const cache = {};

function switchTab(i) {
  document.querySelectorAll('.tab').forEach((t, j) => t.classList.toggle('active', i === j));
  document.querySelectorAll('.content').forEach((c, j) => c.classList.toggle('active', i === j));
}

async function fetchList(id) {
  if (cache[id]) return cache[id];
  const r = await fetch(`https://api.themoviedb.org/3/list/${id}?api_key=${API_KEY}&language=en-US`);
  if (!r.ok) throw new Error(`Could not load list ${id} (${r.status})`);
  const d = await r.json();
  cache[id] = d.items || [];
  return cache[id];
}

function renderItems(items, tabId) {
  const el = document.getElementById(tabId);
  if (!items.length) {
    el.innerHTML = `<div class="state-msg"><span class="icon">🎬</span>No items in this list yet.</div>`;
    return;
  }
  const rows = items.map((item, idx) => {
    const title = item.title || item.name || 'Untitled';
    const date  = item.release_date || item.first_air_date || '';
    const year  = date ? date.substring(0, 4) : '';
    const poster = item.poster_path
      ? `<img class="poster" src="${IMG}${item.poster_path}" alt="" loading="lazy">`
      : `<div class="poster-placeholder">🎬</div>`;
    const divider = idx < items.length - 1 ? '<div class="divider"></div>' : '';
    return `
      <div class="item">
        ${poster}
        <div class="info">
          <div class="title">${escHtml(title)}</div>
          ${year ? `<div class="year">${year}</div>` : ''}
        </div>
      </div>${divider}`;
  }).join('');

  el.innerHTML = `
    <div class="count-bar">${items.length} title${items.length !== 1 ? 's' : ''}</div>
    <div class="list">${rows}</div>`;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function loadTab(listKey, tabId) {
  try {
    const items = await fetchList(LIST_IDS[listKey]);
    renderItems(items, tabId);
  } catch (e) {
    document.getElementById(tabId).innerHTML =
      `<div class="error-msg">⚠️ ${e.message}</div>`;
  }
}

async function init() {
  await Promise.all([
    loadTab('films',       'tab0'),
    loadTab('series',      'tab1'),
    loadTab('watchFilms',  'tab2'),
    loadTab('watchSeries', 'tab3'),
  ]);
}

init();
</script>
</body>
</html>
